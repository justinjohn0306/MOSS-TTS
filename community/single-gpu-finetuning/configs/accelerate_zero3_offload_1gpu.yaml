# Single-GPU DeepSpeed ZeRO-3 + CPU offload. Lets a ~4.55B model full-finetune on a 24 GB
# card by parking params + optimizer state in system RAM. Regenerated by make_ds_config.py
# so gradient_accumulation_steps stays in sync with sft.py's --gradient-accumulation-steps.
compute_environment: LOCAL_MACHINE
debug: false
distributed_type: DEEPSPEED
downcast_bf16: 'no'
deepspeed_config:
  gradient_accumulation_steps: 8
  offload_optimizer_device: cpu
  offload_param_device: cpu
  zero3_init_flag: false
  zero3_save_16bit_model: true
  zero_stage: 3
enable_cpu_affinity: false
machine_rank: 0
main_training_function: main
mixed_precision: bf16
num_machines: 1
num_processes: 1
rdzv_backend: static
same_network: true
use_cpu: false
